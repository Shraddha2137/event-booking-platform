<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Event Booking</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Event Booking Platform</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Events</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section id="events">
    <h2>Upcoming Events</h2>
    <div class="event-card">
      <h3>Music Concert</h3>
      <p>Date: 15 June 2026</p>
      <button onclick="bookEvent('Music Concert')">Book Now</button>
    </div>
    <div class="event-card">
      <h3>Tech Conference</h3>
      <p>Date: 20 June 2026</p>
      <button onclick="bookEvent('Tech Conference')">Book Now</button>
    </div>
  </section>

  <section id="form">
    <h2>Booking Form</h2>
    <form onsubmit="submitForm(event)">
      <input type="text" id="name" placeholder="Your Name" required>
      <input type="email" id="email" placeholder="Your Email" required>
      <input type="number" id="seats" placeholder="Seats" required>
      <button type="submit">Confirm Booking</button>
    </form>
  </section>

  <script src="script.js"></script>
</body>
</html>
